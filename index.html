<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Sequencing with Deadlines</title>
    <style>
        :root {
            --bg-start: #151f3f;
            --bg-end: #2f4d90;
            --panel: rgba(255, 255, 255, 0.96);
            --panel-shadow: 0 25px 60px rgba(0, 0, 0, 0.18);
            --accent: #7367f0;
            --accent-soft: rgba(115, 103, 240, 0.16);
            --success: #2dd4bf;
            --danger: #ef4444;
            --border: #e5e7eb;
            --text: #1f2937;
            --muted: #4b5563;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top left, rgba(115, 103, 240, 0.28), transparent 24%),
                        radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.18), transparent 20%),
                        linear-gradient(135deg, var(--bg-start), var(--bg-end));
            padding: 20px;
        }

        .container {
            max-width: 1180px;
            margin: 0 auto;
            background: var(--panel);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: var(--panel-shadow);
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
        }

        h1 {
            margin: 0;
            padding: 32px 24px;
            text-align: center;
            font-size: clamp(2rem, 2.6vw, 3rem);
            letter-spacing: 0.02em;
            color: white;
            background: linear-gradient(135deg, rgba(115, 103, 240, 0.98), rgba(59, 130, 246, 0.9));
            box-shadow: inset 0 -2px 10px rgba(0,0,0,0.12);
        }

        .content {
            padding: 32px;
        }

        .input-section {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 16px;
            align-items: center;
            padding: 26px;
            background: #ffffff;
            border-radius: 22px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 16px 35px rgba(15, 23, 42, 0.08);
        }

        .input-section label {
            font-size: 1rem;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 8px;
            display: inline-block;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .input-group input {
            width: 130px;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            outline: none;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(115, 103, 240, 0.12);
        }

        .job-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 22px;
            margin-top: 24px;
        }

        .job-card {
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            padding: 24px;
            border-radius: 24px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.06);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .job-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 26px 50px rgba(15, 23, 42, 0.12);
        }

        .job-card h3 {
            margin: 0 0 16px;
            font-size: 1.15rem;
            color: #111827;
        }

        .job-card label {
            display: block;
            margin-top: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--muted);
        }

        .job-card input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid #e5e7eb;
            background: #fff;
            font-size: 0.95rem;
            margin-top: 8px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .job-card input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(115, 103, 240, 0.12);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-top: 28px;
        }

        button {
            min-width: 180px;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
            background: linear-gradient(135deg, var(--accent), #3b82f6);
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.2);
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            opacity: 0.75;
        }

        .output {
            margin-top: 32px;
            padding: 28px;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 28px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 22px 45px rgba(15, 23, 42, 0.08);
        }

        .output h2 {
            margin-top: 0;
            color: #111827;
        }

        .step {
            margin: 16px 0;
            padding: 22px;
            background: #fafbff;
            border-radius: 22px;
            border-left: 5px solid rgba(115, 103, 240, 0.9);
            opacity: 0;
            transform: translateX(-24px);
            transition: opacity 0.55s ease, transform 0.55s ease;
        }

        .step.show {
            opacity: 1;
            transform: translateX(0);
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            overflow: hidden;
            border-radius: 18px;
        }

        .table th, .table td {
            padding: 16px 18px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }

        .table th {
            background: rgba(115, 103, 240, 0.08);
            color: #111827;
            font-weight: 700;
        }

        .table tr:last-child td {
            border-bottom: none;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            margin-top: 24px;
        }

        .summary-card {
            padding: 22px;
            background: #f8fafc;
            border-radius: 20px;
            border: 1px solid #e5e7eb;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.75);
        }

        .summary-card strong {
            display: block;
            margin-bottom: 10px;
            color: #111827;
        }

        .summary-card span {
            display: block;
            font-size: 1.35rem;
            font-weight: 700;
            color: #1f2937;
        }

        .highlight {
            color: var(--accent);
        }

        .loading {
            display: none;
            text-align: center;
            margin: 24px 0;
            padding: 18px;
            background: rgba(255,255,255,0.85);
            border-radius: 18px;
            border: 1px solid rgba(15,23,42,0.08);
        }

        .spinner {
            border: 5px solid rgba(226, 232, 240, 0.8);
            border-top: 5px solid var(--accent);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        .loading p {
            margin: 0;
            color: var(--muted);
            font-weight: 600;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 800px) {
            .content {
                padding: 24px;
            }

            .input-section {
                grid-template-columns: 1fr;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Job Sequencing with Deadlines (Greedy Method)</h1>
        <div class="content">
            <div class="input-section">
                <label for="numJobs" style="font-size: 18px; font-weight: bold;">Number of Jobs:</label>
                <input type="number" id="numJobs" min="1" style="padding: 10px; font-size: 16px; margin-left: 10px; border-radius: 4px; border: 1px solid #ced4da;">
                <button onclick="generateInputs()">Generate Job Inputs</button>
            </div>
            <div id="jobInputs" class="job-inputs"></div>
            <div style="text-align: center;">
                <button id="runBtn" onclick="runSequencing()" disabled>🚀 Run Job Sequencing</button>
                <button onclick="reset()">🔄 Reset</button>
            </div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Processing jobs...</p>
            </div>
            <div id="output" class="output" style="display: none;"></div>
        </div>
    </div>

    <script>
        let stepIndex = 0;
        const steps = [];

        function generateInputs() {
            const num = parseInt(document.getElementById('numJobs').value);
            if (isNaN(num) || num <= 0) {
                alert('Please enter a valid number of jobs.');
                return;
            }
            let html = '';
            for (let i = 0; i < num; i++) {
                html += `
                    <div class="job-card">
                        <h3>Job ${i+1}</h3>
                        <label>ID:</label>
                        <input type="text" id="id${i}" placeholder="e.g., A" required>
                        <label>Deadline:</label>
                        <input type="number" id="deadline${i}" min="1" placeholder="e.g., 2" required>
                        <label>Profit:</label>
                        <input type="number" id="profit${i}" min="1" placeholder="e.g., 100" required>
                    </div>
                `;
            }
            document.getElementById('jobInputs').innerHTML = html;
            document.getElementById('runBtn').disabled = false;
            document.getElementById('output').style.display = 'none';
        }

        function reset() {
            document.getElementById('numJobs').value = '';
            document.getElementById('jobInputs').innerHTML = '';
            document.getElementById('output').innerHTML = '';
            document.getElementById('output').style.display = 'none';
            document.getElementById('runBtn').disabled = true;
            stepIndex = 0;
            steps.length = 0;
        }

        function runSequencing() {
            const num = parseInt(document.getElementById('numJobs').value);
            const jobs = [];
            for (let i = 0; i < num; i++) {
                const id = document.getElementById(`id${i}`).value.trim();
                const deadline = parseInt(document.getElementById(`deadline${i}`).value);
                const profit = parseInt(document.getElementById(`profit${i}`).value);
                if (!id || isNaN(deadline) || isNaN(profit) || deadline <= 0 || profit <= 0) {
                    alert(`Invalid input for Job ${i+1}. Please check all fields.`);
                    return;
                }
                jobs.push({ id, deadline, profit });
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('runBtn').disabled = true;

            setTimeout(() => {
                const result = jobSequencing(jobs);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('output').innerHTML = result;
                document.getElementById('output').style.display = 'block';
                animateSteps();
            }, 1000);
        }

        function jobSequencing(jobs) {
            steps.length = 0;
            let output = '<h2>📊 Results</h2>';

            // Sort jobs by profit descending
            jobs.sort((a, b) => b.profit - a.profit);
            output += '<div class="step"><h3>Jobs After Sorting by Profit (Descending)</h3>';
            output += '<table class="table"><thead><tr><th>Job ID</th><th>Deadline</th><th>Profit</th></tr></thead><tbody>';
            jobs.forEach(job => {
                output += `<tr><td>${job.id}</td><td>${job.deadline}</td><td>${job.profit}</td></tr>`;
            });
            output += '</tbody></table></div>';

            // Find max deadline
            const maxDeadline = Math.max(...jobs.map(j => j.deadline));

            // Create slots
            const slot = new Array(maxDeadline).fill('Empty');
            const filled = new Array(maxDeadline).fill(false);

            let totalProfit = 0;
            let jobsDone = 0;
            const skippedJobs = [];

            output += '<div class="step"><h3>Step-by-Step Job Scheduling</h3>';

            // Assign jobs
            jobs.forEach(job => {
                let placed = false;
                output += `<p>Trying to schedule Job <strong>${job.id}</strong> (Deadline: ${job.deadline}, Profit: ${job.profit})</p>`;

                for (let j = Math.min(maxDeadline, job.deadline) - 1; j >= 0; j--) {
                    if (!filled[j]) {
                        filled[j] = true;
                        slot[j] = job.id;
                        totalProfit += job.profit;
                        jobsDone++;
                        placed = true;
                        output += `<p style="color: green;">✓ Job ${job.id} placed in Slot ${j + 1}</p>`;
                        break;
                    }
                }

                if (!placed) {
                    skippedJobs.push(job.id);
                    output += `<p style="color: red;">✗ Job ${job.id} could NOT be scheduled (Skipped)</p>`;
                }
            });
            output += '</div>';

            // Final slot display
            output += '<div class="step"><h3>Final Slot Allocation</h3>';
            output += '<table class="table"><thead><tr><th>Slot No.</th><th>Assigned Job</th></tr></thead><tbody>';
            for (let i = 0; i < maxDeadline; i++) {
                output += `<tr><td>${i + 1}</td><td>${slot[i]}</td></tr>`;
            }
            output += '</tbody></table></div>';

            // Scheduled jobs in order
            output += '<div class="step"><h3>Scheduled Jobs in Execution Order</h3>';
            const scheduled = [];
            for (let i = 0; i < maxDeadline; i++) {
                if (filled[i]) {
                    scheduled.push(slot[i]);
                }
            }
            output += `<p>${scheduled.join(' → ')}</p></div>`;

            // Skipped jobs
            output += '<div class="step"><h3>Skipped Jobs</h3>';
            if (skippedJobs.length === 0) {
                output += '<p>None</p>';
            } else {
                output += `<p>${skippedJobs.join(', ')}</p>`;
            }
            output += '</div>';

            // Summary
            output += '<div class="step summary"><h3>Final Result Summary</h3>';
            output += `<p><strong>Total Jobs Entered:</strong> ${jobs.length}</p>`;
            output += `<p><strong>Number of Jobs Done:</strong> ${jobsDone}</p>`;
            output += `<p><strong>Number of Jobs Skipped:</strong> ${skippedJobs.length}</p>`;
            output += `<p><strong>Maximum Profit Earned:</strong> $${totalProfit}</p>`;
            output += '</div>';

            return output;
        }

        function animateSteps() {
            const stepElements = document.querySelectorAll('.step');
            stepElements.forEach((el, index) => {
                setTimeout(() => {
                    el.classList.add('show');
                }, index * 500);
            });
        }
    </script>
</body>
</html>
